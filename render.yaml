# Render blueprint — deploys Goal Oracle (World Cup 2026) as ONE web service
# that serves the front-end + the API + the auto-resolve scheduler.
# Deploy: push this repo to GitHub, then Render → New → Blueprint → pick the repo.
services:
  - type: web
    name: goal-oracle
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: node src/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: SPORT
        value: football
      - key: ADMIN_TOKEN
        generateValue: true  # Render generates a strong secret
      - key: AUTH_SECRET
        generateValue: true
      - key: DATABASE_URL          # durable storage — survives redeploys
        fromDatabase:
          name: goal-oracle-db
          property: connectionString
      # ---- Dashboard-managed (sync:false → the blueprint NEVER overwrites these) ----
      # Set FOOTBALLDATA_KEY in the Render dashboard to go live with real World
      # Cup data; the app auto-uses football-data when the key is present.
      - key: FOOTBALLDATA_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      # PROVIDER is optional — only set it to force a provider. Leave it unset and
      # the app infers it from the key above. sync:false so it's never reset.
      - key: PROVIDER
        sync: false

databases:
  - name: goal-oracle-db
    plan: free                     # free managed Postgres

# Storage: with DATABASE_URL set (wired above), streaks/accounts/picks persist
# in Postgres across deploys. Without it the app uses an ephemeral JSON file.
