# Render blueprint — deploys Goal Oracle (World Cup 2026) as ONE web service
# that serves the front-end + the API + the auto-resolve scheduler.
# Deploy: push this repo to GitHub, then Render → New → Blueprint → pick the repo.
services:
  - type: web
    name: goal-oracle
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: node src/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: SPORT
        value: football
      - key: PROVIDER
        value: mock          # set to "cricapi" + CRICAPI_KEY for real results
      - key: SMS_PROVIDER
        value: mock          # set to a real SMS gateway for live phone login
      - key: ADMIN_TOKEN
        generateValue: true  # Render generates a strong secret
      - key: AUTH_SECRET
        generateValue: true
      - key: DATABASE_URL          # durable storage — survives redeploys
        fromDatabase:
          name: goal-oracle-db
          property: connectionString
      # - key: FOOTBALLDATA_KEY  # add for real World Cup results
      #   sync: false
      # - key: GOOGLE_CLIENT_ID  # add for real Google One Tap
      #   sync: false

databases:
  - name: goal-oracle-db
    plan: free                     # free managed Postgres

# Storage: with DATABASE_URL set (wired above), streaks/accounts/picks persist
# in Postgres across deploys. Without it the app uses an ephemeral JSON file.
