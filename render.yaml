# Render blueprint — deploys Goal Oracle (World Cup 2026) as ONE web service
# that serves the front-end + the API + the auto-resolve scheduler.
# Deploy: push this repo to GitHub, then Render → New → Blueprint → pick the repo.
services:
  - type: web
    name: goal-oracle
    runtime: node
    rootDir: server
    plan: free
    buildCommand: npm install
    startCommand: node src/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: SPORT
        value: football
      - key: PROVIDER
        value: mock          # set to "cricapi" + CRICAPI_KEY for real results
      - key: SMS_PROVIDER
        value: mock          # set to a real SMS gateway for live phone login
      - key: ADMIN_TOKEN
        generateValue: true  # Render generates a strong secret
      - key: AUTH_SECRET
        generateValue: true
      # - key: CRICAPI_KEY      # add for live football/cricket data
      #   sync: false
      # - key: GOOGLE_CLIENT_ID # add for real Google One Tap
      #   sync: false

# NOTE: Render's free tier has an EPHEMERAL filesystem — the JSON data store
# resets on each deploy/restart. For durable streaks & accounts, either add a
# paid Disk (mount at /data and set DATA_DIR=/data) or move the store to a
# managed Postgres (see server/src/store.js — it's behind a small interface).
